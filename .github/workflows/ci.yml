name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle
      - name: Build
        run: |
          mkdir -p buildlogs
          gradle --version
          gradle build --no-daemon --stacktrace | tee buildlogs/gradle_build.log
          exit ${PIPESTATUS[0]}
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: buildlogs/gradle_build.log

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: fabric-optmod-jar
          path: build/libs/*.jar
