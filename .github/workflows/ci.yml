name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install Gradle (if missing)
        run: |
          if ! command -v gradle >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gradle
          fi
      - name: Build
        run: |
          # Prefer system gradle if installed, otherwise fall back to wrapper if present
          if command -v gradle >/dev/null 2>&1; then
            gradle build --no-daemon --stacktrace
          elif [ -f ./gradlew ]; then
            ./gradlew build --no-daemon --stacktrace
          else
            echo "No gradle available and no gradle wrapper present" >&2
            exit 1
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fabric-optmod-jar
          path: build/libs/*.jar
